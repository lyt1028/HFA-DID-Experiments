networks:
  hfa-net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.20.0.0/16
services:
  dcl-0:
    cap_add:
    - NET_ADMIN
    command:
    - python
    - -m
    - docker.node_service
    - --role
    - dcl
    - --domain
    - DCL_0
    - --port
    - '5000'
    container_name: hfa-dcl-0
    hostname: dcl-0
    image: hfa-did-node
    networks:
      hfa-net:
        ipv4_address: 172.20.0.30
    volumes:
    - ../:/app
    working_dir: /app
